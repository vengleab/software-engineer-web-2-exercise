<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecturer Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-4 sm:p-10 font-sans">
    <div class="max-w-md mx-auto bg-slate-800 border border-slate-700 p-6 rounded-2xl shadow-xl space-y-6">
        
        <!-- Header & Server Port Info -->
        <div class="flex items-center justify-between border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-white">📚 Course Tasks</h1>
                <p class="text-xs text-slate-400 mt-0.5">PM2 Backend Request Tracker</p>
            </div>
            <!-- Display Requested Server Port -->
            <div class="bg-slate-900 border border-indigo-500/30 px-3 py-2 rounded-xl text-right">
                <span class="text-[10px] uppercase tracking-wider text-slate-400 block font-medium">Server Port</span>
                <span id="serverPortDisplay" class="text-lg font-mono font-bold text-emerald-400">Loading...</span>
            </div>
        </div>

        <div id="errorBox" class="hidden p-3 bg-red-900/50 border border-red-500 text-red-200 rounded-xl text-sm"></div>
        
        <form onsubmit="event.preventDefault(); addTask();" class="space-y-3">
            <input id="taskInput" type="text" placeholder="New task (e.g. Grade ASB2 assignments)" 
                   onkeydown="if(event.key === 'Enter') { event.preventDefault(); addTask(); }"
                   class="border border-slate-600 bg-slate-900 text-white p-3 w-full rounded-xl focus:outline-none focus:border-indigo-500 placeholder-slate-500 text-sm">
            <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-2.5 rounded-xl font-semibold w-full transition shadow-lg shadow-indigo-600/30 text-sm">
                Add Task
            </button>
        </form>

        <ul id="taskList" class="space-y-2">
        </ul>

    </div>

    <script>
        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function clearError() {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '';
            errorBox.classList.add('hidden');
        }

        function updatePortDisplay(port) {
            const el = document.getElementById('serverPortDisplay');
            if (port) {
                el.textContent = `Port: ${port}`;
                el.className = "text-lg font-mono font-bold text-emerald-400";
            } else {
                el.textContent = "Port: N/A";
                el.className = "text-lg font-mono font-bold text-amber-400";
            }
        }

        async function loadTasks() {
            clearError();
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const data = await response.json();
                
                const tasks = Array.isArray(data) ? data : (data.tasks || []);
                if (data.port) {
                    updatePortDisplay(data.port);
                }
                
                document.getElementById('taskList').innerHTML = '';
                tasks.forEach(task => renderTask(task));
            } catch (error) {
                console.error("Error loading tasks:", error);
                showError("Failed to load tasks from backend.");
            }
        }

        async function saveTasks(tasks) {
            const response = await fetch('/api/tasks', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tasks })
            });
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}`);
            }
            return await response.json();
        }

        function renderTask(taskText) {
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-slate-900/80 p-3 rounded-xl border-l-4 border-indigo-500 border-t border-r border-b border-slate-700/60 shadow-sm text-sm";
            li.innerHTML = `<span class="text-slate-100 font-medium">${taskText}</span> 
                            <button onclick="removeTask(this)" class="text-red-400 hover:text-red-300 text-xs font-medium px-2 py-1 bg-red-500/10 hover:bg-red-500/20 border border-red-500/20 rounded-lg transition">Done</button>`;
            document.getElementById('taskList').appendChild(li);
        }

        async function addTask() {
            clearError();
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            const currentTasks = Array.from(document.querySelectorAll('#taskList span')).map(el => el.textContent);
            const updatedTasks = [...currentTasks, text];

            try {
                const result = await saveTasks(updatedTasks);
                if (result && result.port) {
                    updatePortDisplay(result.port);
                }
                renderTask(text);
                input.value = '';
            } catch (error) {
                console.error("Backend error: Record not added.", error);
                showError("Failed to add task: Backend server error or unreachable.");
            }
        }

        async function removeTask(button) {
            clearError();
            const li = button.parentElement;
            const currentTasks = Array.from(document.querySelectorAll('#taskList span')).map(el => el.textContent);
            const taskText = li.querySelector('span').textContent;
            
            const index = currentTasks.indexOf(taskText);
            if (index === -1) return;

            const updatedTasks = [...currentTasks];
            updatedTasks.splice(index, 1);

            try {
                const result = await saveTasks(updatedTasks);
                if (result && result.port) {
                    updatePortDisplay(result.port);
                }
                li.remove();
            } catch (error) {
                console.error("Backend error: Record not removed.", error);
                showError("Failed to remove task: Backend server error or unreachable.");
            }
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
