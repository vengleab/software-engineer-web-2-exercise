<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lecturer Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4">📚 Course Tasks</h1>

        <div id="errorBox" class="hidden mb-4 p-3 bg-red-100 border border-red-400 text-red-700 rounded text-sm"></div>
        
        <div class="mb-6">
            <input id="taskInput" type="text" placeholder="New task (e.g. Grade ASB2 assignments)" 
                   class="border p-2 w-full rounded mb-2">
            <button onclick="addTask()" class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">
                Add Task
            </button>
        </div>

        <ul id="taskList" class="space-y-2">
            </ul>
    </div>

    <script>
        function showError(msg) {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = msg;
            errorBox.classList.remove('hidden');
        }

        function clearError() {
            const errorBox = document.getElementById('errorBox');
            errorBox.textContent = '';
            errorBox.classList.add('hidden');
        }

        async function loadTasks() {
            clearError();
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error(`HTTP error ${response.status}`);
                const tasks = await response.json();
                document.getElementById('taskList').innerHTML = '';
                tasks.forEach(task => renderTask(task));
            } catch (error) {
                console.error("Error loading tasks:", error);
                showError("Failed to load tasks from backend.");
            }
        }

        async function saveTasks(tasks) {
            const response = await fetch('/api/tasks', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tasks })
            });
            if (!response.ok) {
                throw new Error(`HTTP error ${response.status}`);
            }
            return await response.json();
        }

        function renderTask(taskText) {
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-slate-100 p-3 rounded border-l-4 border-blue-500";
            li.innerHTML = `<span>${taskText}</span> 
                            <button onclick="removeTask(this)" class="text-red-500 text-sm">Done</button>`;
            document.getElementById('taskList').appendChild(li);
        }

        async function addTask() {
            clearError();
            const input = document.getElementById('taskInput');
            const text = input.value.trim();
            if (!text) return;

            const currentTasks = Array.from(document.querySelectorAll('#taskList span')).map(el => el.textContent);
            const updatedTasks = [...currentTasks, text];

            try {
                await saveTasks(updatedTasks);
                renderTask(text);
                input.value = '';
            } catch (error) {
                console.error("Backend error: Record not added.", error);
                showError("Failed to add task: Backend server error or unreachable.");
            }
        }

        async function removeTask(button) {
            clearError();
            const li = button.parentElement;
            const currentTasks = Array.from(document.querySelectorAll('#taskList span')).map(el => el.textContent);
            const taskText = li.querySelector('span').textContent;
            
            const index = currentTasks.indexOf(taskText);
            if (index === -1) return;

            const updatedTasks = [...currentTasks];
            updatedTasks.splice(index, 1);

            try {
                await saveTasks(updatedTasks);
                li.remove();
            } catch (error) {
                console.error("Backend error: Record not removed.", error);
                showError("Failed to remove task: Backend server error or unreachable.");
            }
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
