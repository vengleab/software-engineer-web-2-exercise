<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lecturer Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-10">
    <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4">📚 Course Tasks</h1>
        
        <div class="mb-6">
            <input id="taskInput" type="text" placeholder="New task (e.g. Grade ASB2 assignments)" 
                   class="border p-2 w-full rounded mb-2">
            <button onclick="addTask()" class="bg-blue-600 text-white px-4 py-2 rounded w-full hover:bg-blue-700">
                Add Task
            </button>
        </div>

        <ul id="taskList" class="space-y-2">
            </ul>
    </div>

    <script>
        let localTasks = JSON.parse(localStorage.getItem('tasks') || '[]');

        async function loadTasks() {
            try {
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error('Failed to fetch from backend');
                const tasks = await response.json();
                document.getElementById('taskList').innerHTML = '';
                tasks.forEach(task => renderTask(task));
                localTasks = tasks;
                localStorage.setItem('tasks', JSON.stringify(localTasks));
            } catch (error) {
                console.error("Error loading tasks, falling back to local storage:", error);
                document.getElementById('taskList').innerHTML = '';
                localTasks.forEach(task => renderTask(task));
            }
        }

        async function saveTasks() {
            const taskElements = document.querySelectorAll('#taskList span');
            const tasks = Array.from(taskElements).map(el => el.textContent);
            localTasks = tasks;
            localStorage.setItem('tasks', JSON.stringify(tasks));

            try {
                await fetch('/api/tasks', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tasks })
                });
            } catch (error) {
                console.error("Error saving tasks to backend:", error);
            }
        }

        function renderTask(taskText) {
            const li = document.createElement('li');
            li.className = "flex justify-between items-center bg-slate-100 p-3 rounded border-l-4 border-blue-500";
            li.innerHTML = `<span>${taskText}</span> 
                            <button onclick="this.parentElement.remove(); saveTasks()" class="text-red-500 text-sm">Done</button>`;
            document.getElementById('taskList').appendChild(li);
        }

        function addTask() {
            const input = document.getElementById('taskInput');
            if (!input.value) return;
            renderTask(input.value);
            saveTasks();
            input.value = '';
        }

        document.addEventListener('DOMContentLoaded', loadTasks);
    </script>
</body>
</html>
